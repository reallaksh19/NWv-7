name: CI Validation Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter (Must be 0 errors)
      run: npm run lint

    - name: Build App
      run: npm run build

    - name: Run Benchmarks (Precision & Recall Gates)
      run: npm run benchmark

    - name: Run Up Ahead Classification Smoke Test
      run: npm run test:upahead-smoke

    - name: Run Market Snapshot Integrity Test
      run: npm run test:market-snapshot
