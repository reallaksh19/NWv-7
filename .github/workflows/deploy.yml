name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block rejected patch artifacts
        run: |
          if find . \( -name "*.rej" -o -name "*.orig" \) -print -quit | grep -q .; then
            echo "Rejected patch artifacts found. Remove before merging."
            find . \( -name "*.rej" -o -name "*.orig" \) -print
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run benchmark
      - run: npm run test:upahead-smoke
      - run: npm run test:market-snapshot

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
