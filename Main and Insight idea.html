<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Meridian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#0A0D11;--bg2:#12171E;--bgc:rgba(18,23,30,0.6);
  --txt:#FFFFFF;--txt2:#D0D7DE;--muted:#9CA5B0;
  --teal:#00D4AA;--blue:#58A6FF;--warn:#F0883E;--red:#FF4757;--green:#3FB950;
  --border:rgba(48,54,61,0.65);--bsoft:rgba(255,255,255,0.06);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --r12:12px;--r16:16px;--r20:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;height:100%}
body{
  background:
    radial-gradient(900px 400px at 50% -5%,rgba(0,212,170,0.09),transparent 60%),
    radial-gradient(600px 400px at 95% 5%,rgba(88,166,255,0.07),transparent 60%),
    var(--bg);
}
#root{height:100%}

/* ── Shell ── */
.shell{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:40;
  background:rgba(10,13,17,0.92);backdrop-filter:blur(22px);
  border-bottom:1px solid var(--border);
}
.hdr-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;
}
.hdr-left{display:flex;align-items:center;gap:10px}

/* App icon — Meridian globe mark */
.app-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(145deg,#004d3d 0%,#00D4AA 55%,#58A6FF 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,212,170,0.35);
}

/* Refresh chip */
.refresh-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:0.65rem;color:var(--muted);
  padding:3px 8px;border-radius:999px;
  border:1px solid var(--border);background:rgba(255,255,255,0.03);
}
.refresh-chip .rdot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px rgba(63,185,80,0.7);
  animation:rp 2.5s ease-in-out infinite;
}
@keyframes rp{50%{opacity:.4;transform:scale(.8)}}

.hdr-right{display:flex;gap:6px}
.iconbtn{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--border);
  background:var(--bgc);color:var(--txt2);
  display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:.15s;
}
.iconbtn:hover{color:var(--teal);border-color:rgba(0,212,170,0.4)}

/* ── Market Ticker (Main only) ── */
.ticker-wrap{
  border-top:1px solid var(--border);
  background:rgba(10,13,17,0.5);
  padding:0;overflow:hidden;height:32px;display:flex;align-items:center;
}
.ticker-label{
  flex-shrink:0;
  font-family:var(--mono);font-size:0.6rem;font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);
  padding:0 10px 0 14px;border-right:1px solid var(--border);
  height:100%;display:flex;align-items:center;
  background:rgba(0,212,170,0.05);
}
.ticker-track{
  display:flex;align-items:center;
  animation:tickscroll 38s linear infinite;
  white-space:nowrap;padding:0 0;
}
.ticker-track:hover{animation-play-state:paused}
@keyframes tickscroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
.ticker-item{
  display:inline-flex;align-items:center;gap:6px;
  padding:0 18px;border-right:1px solid rgba(255,255,255,0.05);
}
.ticker-name{font-family:var(--mono);font-size:0.68rem;color:var(--muted);font-weight:500}
.ticker-price{font-family:var(--mono);font-size:0.72rem;font-weight:600;color:var(--txt2)}
.ticker-chg{font-family:var(--mono);font-size:0.68rem;font-weight:600}
.ticker-chg.up{color:var(--green)}
.ticker-chg.dn{color:var(--red)}

/* ── Scroll area ── */
.scroll{flex:1;overflow-y:auto;padding:14px 14px 90px}
.scroll::-webkit-scrollbar{width:0}

/* ════════════════════
   WEATHER — old style
   ════════════════════ */
.wx-card{
  border-radius:var(--r16);overflow:hidden;margin-bottom:16px;
  background:linear-gradient(160deg,#0d2035 0%,#0a1520 60%,#0A0D11 100%);
  border:1px solid rgba(88,166,255,0.2);
}
.wx-cities{display:grid;grid-template-columns:repeat(3,1fr)}
.wx-city{
  padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;
  gap:6px;cursor:pointer;transition:.15s;border-right:1px solid rgba(255,255,255,0.06);position:relative;
}
.wx-city:last-child{border-right:none}
.wx-city.active{background:rgba(88,166,255,0.1)}
.wx-city.active::after{
  content:"";position:absolute;bottom:0;left:20%;right:20%;height:2px;
  background:var(--blue);border-radius:2px 2px 0 0;
}
.wx-city .cname{font-size:0.67rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
.wx-city.active .cname{color:var(--blue)}
.wx-city .cico{font-size:1.9rem;line-height:1}
.wx-city .ctemp{font-size:1.35rem;font-weight:700;font-family:var(--mono);letter-spacing:-0.02em}
.wx-forecast{
  padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:flex-start;gap:8px;
}
.wx-forecast .bot{font-size:0.9rem;flex-shrink:0}
.wx-forecast .ftxt{font-size:0.82rem;color:var(--txt2);line-height:1.45}
.wx-ribbon{
  display:flex;overflow-x:auto;padding:10px 14px 12px;
  border-top:1px solid rgba(255,255,255,0.06);
}
.wx-ribbon::-webkit-scrollbar{display:none}
.wx-slot{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:0 12px;border-right:1px solid rgba(255,255,255,0.05);
}
.wx-slot:last-child{border-right:none}
.wx-slot .stime{font-size:0.65rem;color:var(--muted);font-family:var(--mono)}
.wx-slot .sico{font-size:1.2rem;line-height:1}
.wx-slot .stemp{font-size:0.82rem;font-weight:600;font-family:var(--mono)}
.wx-slot .spop{font-size:0.6rem;font-family:var(--mono)}
.wx-slot .spop.rain{color:#58a6ff}
.wx-slot .spop.dry{color:var(--muted)}

/* ════════════════════
   MAIN — news cards
   ════════════════════ */
.breaking-banner{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border-radius:var(--r12);
  background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.3);
  margin-bottom:14px;cursor:pointer;
}
.bpulse{
  width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;
  box-shadow:0 0 0 0 rgba(255,71,87,.7);animation:rpulse 1.6s infinite;
}
@keyframes rpulse{0%{box-shadow:0 0 0 0 rgba(255,71,87,.7)}70%{box-shadow:0 0 0 8px rgba(255,71,87,0)}100%{box-shadow:0 0 0 0 rgba(255,71,87,0)}}
.bhl{font-size:0.85rem;font-weight:600;color:#ffb0b7;flex:1;line-height:1.3}
.barr{color:var(--muted);font-size:0.8rem}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.sec-hdr h2{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:700}
.sec-hdr .cnt{font-family:var(--mono);font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.live-badge{
  font-size:0.58rem;font-weight:700;letter-spacing:0.14em;padding:2px 7px;
  border-radius:999px;background:rgba(63,185,80,0.15);color:var(--green);
  border:1px solid rgba(63,185,80,0.4);text-transform:uppercase;
}

.ncard{
  padding:13px 14px 14px;border-radius:var(--r16);
  background:linear-gradient(180deg,rgba(22,27,34,0.6),rgba(14,18,24,0.6));
  border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:.18s;
}
.ncard:hover{border-color:rgba(0,212,170,0.35);transform:translateY(-1px)}
.nmeta{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.nsrc{font-size:0.72rem;font-weight:600;color:var(--blue);font-family:var(--mono)}
.nstars{color:var(--warn);font-size:0.65rem;letter-spacing:-1px}
.ndiv{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.45;flex-shrink:0}
.ntime{font-size:0.7rem;color:var(--muted);font-family:var(--mono)}
.nsrccnt{font-size:0.65rem;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--bsoft);color:var(--muted);font-family:var(--mono)}
.ntag{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:999px}
.ntag.breaking{background:rgba(255,71,87,0.14);color:#ff8c96;border:1px solid rgba(255,71,87,0.35)}
.ntag.trending{background:rgba(240,136,62,0.14);color:#f0b070;border:1px solid rgba(240,136,62,0.35)}
.ncard h3{font-size:0.98rem;font-weight:600;line-height:1.35;letter-spacing:-0.005em;text-wrap:pretty}
.ncard h3 .arr{color:var(--teal);font-size:0.85em;margin-left:4px;opacity:.8}
.nsum{margin-top:6px;font-size:0.83rem;color:var(--txt2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ncritics{margin-top:8px;padding:8px 10px;border-radius:10px;background:rgba(88,166,255,0.07);border-left:2px solid rgba(88,166,255,0.5);font-size:0.78rem;color:var(--txt2);line-height:1.4}
.ncritics strong{color:var(--blue);font-weight:600}

/* ════════════════════
   INSIGHT TAB
   ════════════════════ */
.ins-pulse{
  display:flex;align-items:center;gap:14px;padding:14px;border-radius:var(--r20);
  background:
    radial-gradient(300px 160px at 80% 0%,rgba(0,212,170,0.15),transparent 60%),
    linear-gradient(180deg,rgba(22,27,34,0.7),rgba(14,18,24,0.7));
  border:1px solid var(--border);margin-bottom:14px;position:relative;overflow:hidden;
}
.ins-pulse::before{
  content:"";position:absolute;inset:-1px;border-radius:inherit;pointer-events:none;
  background:linear-gradient(120deg,rgba(0,212,170,0.4),transparent 40%,transparent 60%,rgba(88,166,255,0.3));
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:1px;
}
.ins-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.ins-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ins-ring .ircenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ins-ring .irscore{font-size:1.3rem;font-weight:700;font-family:var(--mono)}
.ins-ring .irslbl{font-size:0.55rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase}
.ins-body{flex:1;min-width:0}
.eyebrow{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.eyebrow .bip{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:livepulse 1.8s infinite}
@keyframes livepulse{50%{transform:scale(1.4);opacity:.5}}
.ins-body p{font-size:0.88rem;font-weight:600;line-height:1.3;color:var(--txt)}
.ins-body p em{color:var(--teal);font-style:normal}
.ins-meta{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:0.65rem;color:var(--muted)}
.ins-meta b{color:var(--txt2);font-weight:500}

.sstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:16px}
.sig{border:1px solid var(--border);border-radius:13px;background:var(--bgc);padding:9px 7px 10px;display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden;align-items:flex-start}
.sig::after{content:"";position:absolute;left:10px;right:10px;top:0;height:2px;border-radius:0 0 2px 2px;background:var(--tone,var(--muted));opacity:.85}
.sig .snum{font-size:1.05rem;font-weight:700;font-family:var(--mono);letter-spacing:-0.02em}
.sig .slb{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;line-height:1.2}
.sig[data-t="info"]{--tone:var(--blue)}.sig[data-t="warn"]{--tone:var(--warn)}.sig[data-t="good"]{--tone:var(--green)}.sig[data-t="teal"]{--tone:var(--teal)}.sig[data-t="mute"]{--tone:#55606C}

.isec{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.isec h3{font-size:0.9rem;font-weight:700;letter-spacing:-0.01em;color:var(--txt);display:flex;align-items:center;gap:8px}
.isec .glyph{width:22px;height:22px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:rgba(0,212,170,0.1);color:var(--teal);font-size:0.72rem;border:1px solid rgba(0,212,170,0.28);flex-shrink:0}
.isec .imeta{font-family:var(--mono);font-size:0.65rem;color:var(--muted)}.isec .imeta b{color:var(--txt2)}

.icard{border:1px solid var(--border);border-radius:var(--r16);background:linear-gradient(180deg,rgba(22,27,34,0.6),rgba(14,18,24,0.6));margin-bottom:10px;overflow:hidden;transition:.18s}
.icard:hover{border-color:rgba(0,212,170,0.3)}
.icard.open{border-color:rgba(0,212,170,0.5)}
.icard-top{display:grid;grid-template-columns:28px 1fr 36px;gap:10px;padding:13px 12px;cursor:pointer;align-items:start}
.irank{font-family:var(--mono);font-size:0.95rem;font-weight:600;color:var(--muted);padding-top:2px;text-align:center}
.icard[data-top="true"] .irank{color:var(--teal)}
.ibody{min-width:0}
.imeta-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.isource{font-size:0.7rem;font-weight:600;color:var(--txt2);font-family:var(--mono)}
.idot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.45;flex-shrink:0}
.itime{font-size:0.68rem;color:var(--muted);font-family:var(--mono)}
.itag{font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:999px}
.itag.breaking{background:rgba(255,71,87,0.14);color:#ff8c96;border:1px solid rgba(255,71,87,0.35)}
.itag.multi{background:rgba(63,185,80,0.12);color:#7ee38a;border:1px solid rgba(63,185,80,0.3)}
.icard h3{font-size:0.96rem;font-weight:600;line-height:1.33;letter-spacing:-0.005em;text-wrap:pretty}
.iimpact{margin-top:9px;display:flex;align-items:center;gap:9px}
.ibar{flex:1;height:4px;border-radius:3px;background:rgba(255,255,255,0.05);overflow:hidden}
.ibar span{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.ival{font-family:var(--mono);font-size:0.66rem;color:var(--muted);min-width:36px;text-align:right}
.isrcs{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
.isrcs .s{font-size:0.62rem;color:var(--muted);font-family:var(--mono);padding:2px 6px;border-radius:6px;background:rgba(255,255,255,0.03);border:1px solid var(--bsoft)}

.expand-btn{
  width:32px;height:32px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,0.03);color:var(--muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.18s;flex-shrink:0;font-size:1.1rem;line-height:1;align-self:flex-start;margin-top:2px;
}
.expand-btn:hover{color:var(--teal);border-color:rgba(0,212,170,0.4)}
.icard.open .expand-btn{color:var(--teal);border-color:rgba(0,212,170,0.5);background:rgba(0,212,170,0.08)}

.iexpand{border-top:1px solid var(--border);background:rgba(10,13,17,0.5)}
.iexpand-inner{padding:14px 14px 16px}
.exp-block{margin-bottom:14px}.exp-block:last-child{margin-bottom:0}
.exp-label{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.exp-label .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);opacity:.8}
.exp-summary{font-size:0.86rem;color:var(--txt2);line-height:1.55}
.critics-box{padding:10px 12px;border-radius:12px;background:rgba(88,166,255,0.06);border-left:2px solid rgba(88,166,255,0.55)}
.critics-box .ctxt{font-size:0.85rem;color:var(--txt2);line-height:1.5;font-style:italic}
.src-list{display:flex;flex-direction:column;gap:6px}
.src-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,0.025);border:1px solid var(--bsoft)}
.src-item .sname{font-size:0.8rem;font-weight:600;color:var(--txt2);font-family:var(--mono);min-width:68px}
.src-item .sdesc{font-size:0.76rem;color:var(--muted);flex:1;line-height:1.3}
.src-item .stime{font-size:0.63rem;color:var(--muted);font-family:var(--mono);flex-shrink:0}
.src-item .ang{font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border-radius:999px;flex-shrink:0}
.src-item .ang.same{background:rgba(63,185,80,0.1);color:#7ee38a;border:1px solid rgba(63,185,80,0.28)}
.src-item .ang.diff{background:rgba(88,166,255,0.1);color:#90bfff;border:1px solid rgba(88,166,255,0.28)}
.angle-list{display:flex;flex-direction:column;gap:6px}
.angle-item{padding:9px 11px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--bsoft)}
.angle-item .acat{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);margin-bottom:4px}
.angle-item .atxt{font-size:0.82rem;color:var(--txt2);line-height:1.35}
.sent-row{display:flex;gap:8px}
.sent-pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 6px;border-radius:11px;border:1px solid var(--bsoft);background:rgba(255,255,255,0.02)}
.sent-pill .sl{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:700}
.sent-pill .sv{font-size:1rem;font-weight:700;font-family:var(--mono)}
.sent-pill.pos{border-color:rgba(63,185,80,0.3);background:rgba(63,185,80,0.05)}.sent-pill.pos .sl,.sent-pill.pos .sv{color:var(--green)}
.sent-pill.neg{border-color:rgba(255,71,87,0.3);background:rgba(255,71,87,0.05)}.sent-pill.neg .sl,.sent-pill.neg .sv{color:#ff8c96}
.sent-pill.neu .sl,.sent-pill.neu .sv{color:var(--muted)}

.covgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:14px;border-radius:var(--r16);background:var(--bgc);border:1px solid var(--border)}
.covcell{padding:9px 10px;border-radius:11px;background:rgba(255,255,255,0.025);border:1px solid var(--bsoft);min-height:62px;display:flex;flex-direction:column;gap:4px}
.covcell .ctop{display:flex;align-items:center;justify-content:space-between}
.covcell .cname{font-size:0.75rem;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68px}
.covcell .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── NCard ── */
function NCard({s}){
  return (
    <div className="ncard">
      <div className="nmeta">
        <span className="nsrc">{s.src}</span><Stars n={s.stars}/>
        <span className="ndiv"/><span className="ntime">{s.time} ago</span>

        {s.isBreaking&&<span className="ntag breaking">⚡ Breaking</span>}
        {s.isTrending&&<span className="ntag trending">🔥 Trending</span>}
      </div>
      <h3>• {s.hl} <span className="arr">↗</span></h3>
      {s.sum&&<p className="nsum">{s.sum}</p>}
      {s.critics&&<div className="ncritics"><strong>Critics Take:</strong> "{s.critics}"</div>}
    </div>
  );
}

/* ── ICard ── */
function ICard({story}){
  const [open,setOpen]=useState(false);
  const pct=Math.round(story.impact*100);
  return (
    <div className={`icard ${open?'open':''}`} data-top={story.top?'true':'false'}>
      <div className="icard-top" onClick={()=>setOpen(o=>!o)}>
        <div className="irank">{String(story.rank).padStart(2,'0')}</div>
        <div className="ibody">
          <div className="imeta-row">
            <span className="isource">{story.src}</span><span className="idot"/>
            <span className="itime">{story.time} ago</span>
            {story.isBreaking&&<span className="itag breaking">⚡ Breaking</span>}
            {story.srcCount>1&&<span className="itag multi">{story.srcCount} sources</span>}
          </div>
          <h3>{story.hl}</h3>
          <div className="iimpact"><div className="ibar"><span style={{width:`${pct}%`}}/></div><div className="ival">{story.impact.toFixed(2)}</div></div>
          <div className="isrcs">{story.srcs.map(s=><span key={s} className="s">{s}</span>)}</div>
        </div>
        <button className="expand-btn" tabIndex={-1}>{open?'−':'+'}</button>
      </div>
      {open&&(
        <div className="iexpand"><div className="iexpand-inner">
          <div className="exp-block">
            <div className="exp-label"><span className="dot"/>Summary</div>
            <p className="exp-summary">{story.sum}</p>
          </div>
          {story.critics&&(
            <div className="exp-block">
              <div className="exp-label"><span className="dot" style={{background:'var(--blue)'}}/>Critics Take</div>
              <div className="critics-box"><p className="ctxt">"{story.critics}"</p></div>
            </div>
          )}
          <div className="exp-block">
            <div className="exp-label"><span className="dot" style={{background:'var(--warn)'}}/>Other Sources</div>
            <div className="src-list">{story.sources.map((src,i)=>(
              <div key={i} className="src-item">
                <span className="sname">{src.name}</span>
                <span className="sdesc">{src.desc}</span>
                <span className="stime">{src.time}</span>
                <span className={`ang ${src.angle}`}>{src.angle==='same'?'Same angle':'New angle'}</span>
              </div>
            ))}</div>
          </div>
          <div className="exp-block">
            <div className="exp-label"><span className="dot" style={{background:'#9b59ff'}}/>Related Angles</div>
            <div className="angle-list">{story.angles.map((a,i)=>(
              <div key={i} className="angle-item">
                <div className="acat">{a.cat}</div>
                <div className="atxt">{a.txt}</div>
              </div>
            ))}</div>
          </div>
          <div className="exp-block">
            <div className="exp-label"><span className="dot" style={{background:'var(--green)'}}/>Sentiment</div>
            <div className="sent-row">
              <div className="sent-pill pos"><span className="sl">Positive</span><span className="sv">{story.sent.pos}%</span></div>
              <div className="sent-pill neg"><span className="sl">Negative</span><span className="sv">{story.sent.neg}%</span></div>
              <div className="sent-pill neu"><span className="sl">Neutral</span><span className="sv">{story.sent.neu}%</span></div>
            </div>
          </div>
        </div></div>
      )}
    </div>
  );
}

    {id:'festivals',label:'Festivals',ic:'🎪',items:[
      {id:'f1',date:'Sat, 27 Apr',title:'Chithirai Festival',desc:'Chennai · 48-day festival',link:'#'},
      {id:'f2',date:'Mon, 01 May',title:'May Day Celebrations',desc:'Labour Day events',link:'#'},
    ]},
    {id:'sales',label:'Shopping',ic:'🏷️',items:[
      {id:'sa1',date:'Fri, 28 Apr',title:'Summer Mega Sale',desc:'30-50% off · E-commerce',link:'#',isOffer:true},
      {id:'sa2',date:'Sun, 30 Apr',title:'Fashion Week Sale',desc:'Exclusive discounts',link:'#',isOffer:true},
    ]},
    {id:'alerts',label:'Alerts',ic:'⚠️',items:[
      {id:'al1',date:'Today · 14:30',title:'Heat Wave Alert',desc:'Tamil Nadu · High temp warning',link:'#',isAlert:true},
      {id:'al2',date:'Tomorrow · 06:00',title:'Flight Delay Notice',desc:'Monsoon impact expected',link:'#',isAlert:true},
    ]},
  ];
  return (
    <div className="scroll">
      <div style={{marginBottom:'12px'}}>
        <div style={{fontSize:'0.75rem',fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--teal)',marginBottom:'10px',paddingLeft:'2px'}}>Upcoming Events & Releases</div>
      </div>
      {CATEGORIES.map(cat=>(
        <div key={cat.id} style={{marginBottom:'20px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:'1.2rem'}}>{cat.ic}</span>
            <h3 style={{fontSize:'0.9rem',fontWeight:700,color:'var(--txt)',margin:0}}>{cat.label}</h3>
            <span style={{fontSize:'0.65rem',color:'var(--muted)',fontFamily:'var(--mono)',marginLeft:'auto'}}>{cat.items.length} items</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {cat.items.map(item=>(
              <div key={item.id} style={{
                padding:'12px 14px',borderRadius:'var(--r12)',
                background:'linear-gradient(180deg,rgba(22,27,34,0.6),rgba(14,18,24,0.6))',
                border:'1px solid var(--border)',
                display:'flex',alignItems:'center',gap:'12px',cursor:'pointer'
              }}>
                <div style={{flex:'0 0 auto'}}>
                  <div style={{fontSize:'0.65rem',fontFamily:'var(--mono)',color:'var(--muted)',fontWeight:600,marginBottom:'2px'}}>{item.date}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'0.88rem',fontWeight:600,color:'var(--txt)',marginBottom:'3px'}}>{item.title}</div>
                  <div style={{fontSize:'0.75rem',color:'var(--muted)'}}>{item.desc}</div>
                </div>
                {item.isOffer && <span style={{fontSize:'0.8rem',padding:'2px 7px',borderRadius:'999px',background:'rgba(240,136,62,0.14)',color:'#f0b070',border:'1px solid rgba(240,136,62,0.35)',fontWeight:600,flexShrink:0}}>Offer</span>}
                {item.isAlert && <span style={{fontSize:'0.8rem',padding:'2px 7px',borderRadius:'999px',background:'rgba(255,71,87,0.14)',color:'#ff8c96',border:'1px solid rgba(255,71,87,0.35)',fontWeight:600,flexShrink:0}}>Alert</span>}
                <button style={{
                  padding:'4px 10px',borderRadius:'8px',border:'1px solid var(--border)',
                  background:'rgba(255,255,255,0.05)',color:'var(--teal)',fontSize:'0.75rem',
                  fontWeight:600,cursor:'pointer',flexShrink:0,transition:'.15s'
                }} onClick={e=>{e.target.innerHTML='✓ Added';e.target.style.color='var(--green)';setTimeout(()=>{e.target.innerHTML='+ Plan';e.target.style.color='var(--teal)'},2000)}}>+ Plan</button>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── Planner Tab ── */
function PlannerTab(){
  const PLAN_DATA=[
    {date:'Wed, 24 Apr',items:[
      {id:'p1',icon:'🎬',title:'Deadpool & Wolverine premiere',cat:'Movie',link:'#'},
      {id:'p2',icon:'⚽',title:'IPL: RCB vs MI',cat:'Sports',link:'#'},
    ]},
    {date:'Fri, 26 Apr',items:[
      {id:'p3',icon:'🎪',title:'Chithirai Festival opening',cat:'Festival',link:'#'},
    ]},
    {date:'Sun, 28 Apr',items:[
      {id:'p4',icon:'🏷️',title:'Summer Mega Sale starts',cat:'Shopping',link:'#'},
      {id:'p5',icon:'📚',title:'Book launch: New releases',cat:'Culture',link:'#'},
    ]},
  ];
  const [undo,setUndo]=useState(null);
  const handleRemove=(date,id)=>{
    setUndo({date,id});
    setTimeout(()=>setUndo(null),5000);
  };
  return (
    <div className="scroll">
      <div style={{marginBottom:'16px'}}>
        <div style={{fontSize:'0.75rem',fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--teal)',marginBottom:'10px'}}>Your Events</div>
      </div>
      {PLAN_DATA.length===0?(
        <div style={{padding:'40px 20px',textAlign:'center',opacity:.5}}>
          <div style={{fontSize:'2.5rem',marginBottom:'12px'}}>📭</div>
          <div style={{fontSize:'0.9rem',color:'var(--muted)'}}>Your planner is empty</div>
          <div style={{fontSize:'0.8rem',color:'var(--muted)',marginTop:'8px'}}>Find events in Up Ahead and add them</div>
        </div>
      ):(
        PLAN_DATA.map(day=>(
          <div key={day.date} style={{marginBottom:'16px'}}>
            <div style={{
              display:'inline-flex',alignItems:'center',gap:'8px',
              padding:'5px 12px',borderRadius:'10px',
              background:'rgba(0,212,170,0.1)',border:'1px solid rgba(0,212,170,0.3)',
              marginBottom:'10px',
            }}>
              <span style={{fontSize:'0.75rem',fontWeight:700,color:'var(--teal)',letterSpacing:'0.06em',textTransform:'uppercase'}}>{day.date}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              {day.items.map(item=>(
                <div key={item.id} style={{
                  padding:'11px 14px',borderRadius:'var(--r12)',
                  background:'linear-gradient(180deg,rgba(22,27,34,0.4),rgba(14,18,24,0.4))',
                  border:'1px solid var(--border)',
                  display:'flex',alignItems:'center',gap:'12px',position:'relative'
                }}>
                  <span style={{fontSize:'1.2rem',flexShrink:0}}>{item.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'0.87rem',fontWeight:600,color:'var(--txt)',marginBottom:'2px'}}>{item.title}</div>
                    <div style={{fontSize:'0.68rem',color:'var(--muted)',textTransform:'capitalize'}}>{item.cat}</div>
                  </div>
                  <button style={{
                    width:'28px',height:'28px',borderRadius:'8px',border:'1px solid var(--border)',
                    background:'rgba(255,255,255,0.05)',color:'var(--muted)',
                    display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                    fontSize:'0.9rem',transition:'.15s',flexShrink:0
                  }} onClick={()=>handleRemove(day.date,item.id)} title="Remove">✕</button>
                </div>
              ))}
            </div>
          </div>
        ))
      )}
      {undo && (
        <div style={{
          position:'fixed',bottom:'90px',left:'50%',transform:'translateX(-50%)',
          padding:'10px 16px',borderRadius:'12px',background:'rgba(63,185,80,0.15)',
          border:'1px solid rgba(63,185,80,0.4)',display:'flex',alignItems:'center',gap:'10px',
          fontSize:'0.82rem',color:'var(--green)',fontWeight:600,zIndex:100
        }}>
          Item removed
          <button onClick={()=>setUndo(null)} style={{background:'none',border:'none',color:'inherit',cursor:'pointer',fontWeight:700}}>Undo</button>
        </div>
      )}
    </div>
  );
}

/* ── Root ── */
function App(){
  const [tab,setTab]=useState('main');
  const NAV=[
    {id:'main',label:'Main',ic:'🏠'},
    {id:'insight',label:'Insight',ic:<InsightIcon/>},
    {id:'upahead',label:'Up Ahead',ic:'🗓'},
    {id:'planner',label:'Planner',ic:'📌'},
    {id:'market',label:'Market',ic:'📈'},
  ];
  return (
    <div className="shell">
      {/* Header */}
      <div className="hdr">
        <div className="hdr-row">
          <div className="hdr-left">
            <div className="app-icon"><AppIcon/></div>
            <div className="refresh-chip">
              <span className="rdot"/>
              27m ago
            </div>
          </div>
          <div className="hdr-right">
            <button className="iconbtn" title="Refresh">↻</button>
            <button className="iconbtn" title="Settings">⚙</button>
          </div>
        </div>
        {/* Market ticker — main tab only */}
        {tab==='main' && <Ticker/>}
      </div>

      {/* Content */}
      {tab==='main'    && <MainTab/>}
      {tab==='insight' && <InsightTab/>}
      {tab==='upahead' && <UpAheadTab/>}
      {tab==='planner' && <PlannerTab/>}
      {tab==='market'  && <PlaceholderTab label="MARKET"/>}

      {/* Bottom nav — 5 items */}
      <nav className="bnav">
        {NAV.map(n=>(
          <a key={n.id} className={tab===n.id?'active':''} onClick={e=>{e.preventDefault();setTab(n.id)}} href="#">
            <span className="bi">{n.ic}</span>
            <span>{n.label}</span>
          </a>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
